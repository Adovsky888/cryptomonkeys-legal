<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CryptoMonkeys Uploader — OAuth</title>
<style>
  body{max-width:640px;margin:36px auto;padding:0 18px;font:16px/1.5 -apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#111;background:#fff}
  h1{font-size:20px;margin:0 0 12px}
  .code{font:600 17px/1.45 ui-monospace,Menlo,Consolas,monospace;word-break:break-all;background:#f3f4f6;border:1px solid #d1d5db;border-radius:10px;padding:16px;margin:14px 0}
  button{font:600 16px/1 inherit;padding:14px 18px;border:0;border-radius:10px;background:#0a66c2;color:#fff;cursor:pointer}
  .err{color:#b00020}
  .muted{color:#666;font-size:14px}
</style>
</head>
<body>
<h1>CryptoMonkeys Uploader</h1>
<div id="out">Читаю адрес…</div>
<script>
  var u = new URL(window.location.href);
  var code = u.searchParams.get('code');
  var err = u.searchParams.get('error_description') || u.searchParams.get('error_message') || u.searchParams.get('error');
  var out = document.getElementById('out');
  if (code) {
    code = code.replace(/[#_]+$/, '');
    out.innerHTML = '<p>✅ Готово. Скопируй этот код и пришли его в чат:</p>'
      + '<div class="code" id="c"></div>'
      + '<button id="cp">Скопировать код</button>'
      + '<p class="muted">Код одноразовый и живёт недолго - пришли сразу.</p>';
    document.getElementById('c').textContent = code;
    document.getElementById('cp').addEventListener('click', function () {
      navigator.clipboard.writeText(code).then(function () {
        document.getElementById('cp').textContent = 'Скопировано ✓';
      });
    });
  } else if (err) {
    out.innerHTML = '<p class="err">Ошибка авторизации:</p><div class="code" id="e"></div>';
    document.getElementById('e').textContent = err;
  } else {
    out.innerHTML = '<p class="muted">В адресе нет кода. Открой эту страницу по ссылке-разрешению, а не напрямую.</p>';
  }
</script>
</body>
</html>
